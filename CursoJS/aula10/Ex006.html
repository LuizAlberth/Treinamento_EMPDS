<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex006</title>
    <style>
        div#area{
            background: rgb(141, 204, 141);
            color: white;
            width: 200px;
            height: 200px;
            text-align: center;
            line-height: 200px;
            font-size: larger;

        }

    </style>
</head>
<body>
    <div id="area" onmouseenter="entrar()" onmouseleave="sair()" onclick="clicar()">
        Não clique aqui...
    </div>

    <script>
        function entrar(){
            var a = window.document.getElementById('area')
            a.innerText = 'É o sue último aviso...'
        }
        
        function sair(){
            var a = window.document.getElementById('area')
            a.innerText = 'Não clique aqui...'
        }


        function clicar(){
            var a = window.document.getElementById('area')
            a.innerText = 'Todo Diego da a bunda'
        }
    </script>
</body>
</html>
