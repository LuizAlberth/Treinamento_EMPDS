<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
    
        h1 {
            color: #333;
            margin-bottom: 20px;
        }
    
        
        div#calc {
            background-color: #3d4d5d; 
            width: 350px; 
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
        }
    
       
        div#head {
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            width: 100%;
            margin-bottom: 25px;
        }
    
        input[type="number"] {
            padding: 12px;
            border-radius: 8px;
            border: none;
            font-size: 1.2rem;
            text-align: left;
            background-color: #e0e0e0;
            outline: none;
        }
    
      
        div#base {
            display: grid; 
            grid-template-columns: 1fr 1fr;
            gap: 10px; 
            width: 100%;
        }
    
        input[type="button"] {
            padding: 15px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #ff9f0a; 
            color: white;
            transition: background 0.2s, transform 0.1s;
        }
    
        input[type="button"]:hover {
            background-color: #e68e00;
        }
    
        input[type="button"]:active {
            transform: scale(0.95);
        }
    
      
        div#res {
            margin-top: 25px;
            padding: 15px;
            width: 100%;
            background-color: #2c3e50;
            color: #00ffcc;
            border-radius: 10px;
            text-align: center;
            font-size: 1.1rem;
            min-height: 20px;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <h1>Calculadora</h1>
    <div id="calc">
        <div id="head">
            <br>
    <input type="number" name="entrada1" id="entrada1">  <br>  
    <input type="number" name="entrada2" id="entrada2">
        </div>
    <br><br>
        <div id="base">
    <input type="button" value="Somar" onclick="somar()"> 
    <input type="button" value="Subtrair" onclick="subtrair()">
    <input type="button" value="Multiplicar" onclick="multiplicar()"> 
    <input type="button" value="Dividir" onclick="dividir()">
        </div>
    <br><br>
    <div id="res">Resultado</div>
    <script>
            var entradaN1 = window.document.getElementById('entrada1')
            var entradaN2 = window.document.getElementById('entrada2')
            var resposta = window.document.getElementById('res')
           

        function somar(){ 
            var n1 = Number(entradaN1.value)
            var n2 = Number(entradaN2.value)
            var resul = n1 + n2
            res.innerHTML = `A soma entre ${n1} e ${n2} é igual a <strong>${resul}<strong>`
        }

        function subtrair(){ 
            var n1 = Number(entradaN1.value)
            var n2 = Number(entradaN2.value)
            var resul = n1 - n2
            res.innerHTML = `A subtração entre ${n1} e ${n2} é igual a <strong>${resul}<strong>`
        }

        function multiplicar(){ 
            var n1 = Number(entradaN1.value)
            var n2 = Number(entradaN2.value)
            var resul = n1 * n2
            res.innerHTML = `A multiplicação entre ${n1} e ${n2} é igual a <strong>${resul}<strong>`
        }

        function dividir(){ 
            var n1 = Number(entradaN1.value)
            var n2 = Number(entradaN2.value)
            var resul = n1 / n2
            res.innerHTML =resul
        }
    </script>
    </div>
</body>
</html>
