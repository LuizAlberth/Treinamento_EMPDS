<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analisar Números</title>
    <link rel="stylesheet" href="Estilo.css">
</head>
<body>
    <header>
        <h1>Analisador de Números</h1>
    </header>
    <br>
    <section id="conteudo">
        <div>
            <p>Número: 
                <input type="number" id="numero">
                <input type="button" value="Adicionar" id="add" onclick="adicionar()">
            </p>
        </div>
        <div id="valores">
            Valores
        </div>
        <br><br>
        <div id="res">
            Resultado
        </div>
        <br>
        <div>   
            <input type="button" value="Finalizar" id="fim" onclick="finalizar()">

        </div>
    </section>
    <script src="Script.js"></script>
</body>
</html>
